name: publish-pypi

# Publish to PyPI after the release workflow completes successfully.
# This avoids duplicating the 3 validation layers (unit-test, e2e,
# real-world) that release.yml already runs.

on:
  workflow_run:
    workflows:
      - release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # Only publish when the release workflow succeeded (not on failure
    # or cancellation).  workflow_dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/qrstream/

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          # workflow_run checks out the default branch by default;
          # we need the tag that triggered the release workflow.
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        # setup-uv stopped publishing floating major/minor tags at v8
        # (https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0).
        # Pin an exact release tag; update manually when a newer one is
        # desired. A commit SHA would be even safer.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
