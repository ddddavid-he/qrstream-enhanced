name: publish-pypi

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/qrstream/

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        # setup-uv stopped publishing floating major/minor tags at v8
        # (https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0).
        # Pin an exact release tag; update manually when a newer one is
        # desired. A commit SHA would be even safer.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
