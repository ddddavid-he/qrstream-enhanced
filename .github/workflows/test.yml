name: test

# Unit-test gate.
#
# Trigger policy
# --------------
# ``dev`` is the single integration gate in this project's branching
# model (see BRANCHING.md):
#
#   feature/* ──PR──▶ dev ──merge──▶ main ──tag v*──▶ release
#
# Everything must pass the full test suite on ``dev`` before it can
# flow to ``main``.  ``main`` itself does NOT trigger CI on push or
# PR — it is a pure publication channel fed exclusively by
# already-validated ``dev`` merges.  The ``tag v*`` event re-runs
# this workflow via ``workflow_call`` in release.yml / publish.yml
# as the last safety net before a PyPI release (catches dev→main
# merge mistakes and PyPI build-environment drift).

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    # Allow opting out of CI on push events with a ``skip-ci:``
    # commit-message prefix.  See BRANCHING.md → "skip-ci: 约定".
    # Only ``push`` is gated — ``pull_request``, ``workflow_call``
    # (release gate), ``workflow_dispatch`` and ``schedule`` always
    # run regardless of commit message.
    if: |
      !(
        github.event_name == 'push' &&
        startsWith(github.event.head_commit.message || '', 'skip-ci:')
      )
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux (amd64 + arm64) across every supported Python version
        # is the primary coverage surface.  A single macOS cell is
        # added via ``include`` to validate the darwin-arm64
        # opencv-contrib-python wheel — Intel macOS (x86_64) is not
        # a supported target (modern macOS users are on Apple
        # Silicon) and would double the macOS billing cost for
        # negligible additional coverage.
        #
        # macOS runners DO NOT expose GPUs; any MNN Metal path is
        # expected to fall back to MNN CPU or to OpenCV.  See
        # ``mnn-tests.yml`` for explicit MNN-enabled validation.
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        include:
          - os: macos-latest
            python-version: '3.13'

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        # setup-uv stopped publishing floating major/minor tags at v8
        # (https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0).
        # Pin an exact release tag; update manually when a newer one is
        # desired. A commit SHA would be even safer.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        # Unit tests only — the slow real-world phone-recording
        # layer lives in a separate workflow
        # (.github/workflows/real-world-tests.yml) so that
        # ~15-60 s of OpenCV/WeChatQRCode work doesn't run once
        # per (os × python-version) matrix cell.
        run: uv run pytest tests/ -v

      - name: Build distributions
        # Build once per Linux architecture on Python 3.13. The wheel
        # is pure Python, so one architecture-agnostic build is enough
        # — macOS runners skip this step.
        if: matrix.python-version == '3.13' && startsWith(matrix.os, 'ubuntu-')
        run: uv build

      - name: Upload built distributions
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
