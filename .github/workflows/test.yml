name: test

on:
  push:
    branches:
      - main
      - dev
      - 'dev/*'
  pull_request:
    branches:
      - main
      - dev
      - 'dev/*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        # setup-uv stopped publishing floating major/minor tags at v8
        # (https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0).
        # Pin an exact release tag; update manually when a newer one is
        # desired. A commit SHA would be even safer.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ -v

      - name: Run end-to-end phone-recording tests
        # Only on 3.13 — the E2E recordings exercise OpenCV /
        # WeChatQRCode, not Python-version-specific code, so running
        # them once across the matrix is enough.  They take ~15 s
        # total because they actually decode real phone videos from
        # tests/fixtures/.
        if: matrix.python-version == '3.13'
        run: uv run pytest -m slow -v

      - name: Build distributions
        if: matrix.python-version == '3.13'
        run: uv build

      - name: Upload built distributions
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
