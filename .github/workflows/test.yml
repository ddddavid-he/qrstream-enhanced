name: test

on:
  push:
    branches:
      - main
      - dev
      - 'dev/*'
  pull_request:
    branches:
      - main
      - dev
      - 'dev/*'
  workflow_dispatch:
  # Allow release.yml / publish.yml to reuse this workflow as a gate
  # before tagging a new version.  When called this way, a failing
  # test run blocks the release.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    # Run the full suite on both x86_64 and arm64 public runners.
    # Both architectures must pass before a release / PyPI publish
    # is allowed — see release.yml / publish.yml which `needs: test`.
    #
    # GitHub-hosted arm64 Linux runners became free for public
    # repositories in 2024; we pin the concrete label instead of a
    # generic `linux-arm64` alias for reproducibility.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # x86_64 / amd64
          - ubuntu-24.04-arm    # aarch64 / arm64
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        # setup-uv stopped publishing floating major/minor tags at v8
        # (https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0).
        # Pin an exact release tag; update manually when a newer one is
        # desired. A commit SHA would be even safer.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ -v

      - name: Run end-to-end phone-recording tests
        # Only on 3.13 — the E2E recordings exercise OpenCV /
        # WeChatQRCode, not Python-version-specific code, so running
        # them once per architecture across the matrix is enough.
        # They take ~15–60 s total (per arch) because they actually
        # decode real phone videos from tests/fixtures/.
        if: matrix.python-version == '3.13'
        run: uv run pytest -m slow -v

      - name: Build distributions
        # One build per architecture is intentional: we verify the
        # sdist + wheel actually build on both hosts, but we only
        # upload the amd64-built artifact since the wheel is pure
        # Python (arch-independent) and PyPI only needs one copy.
        if: matrix.python-version == '3.13'
        run: uv build

      - name: Upload built distributions
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  # ── Informational probe ────────────────────────────────────────
  # This job runs the decoder with the multiprocessing start method
  # flipped back to ``fork`` and checks whether testcase-v070 still
  # decodes byte-exactly.  It is intentionally **not** a release
  # gate — neither ``release.yml`` nor ``publish.yml`` list it in
  # their ``needs:`` — and ``continue-on-error: true`` means a red
  # run shows up as a warning in the Actions UI without failing the
  # workflow.
  #
  # Purpose: give us a forward-looking signal that our code happens
  # to still be fork-safe on every push, without letting a
  # fork-specific regression (e.g. Python 3.14 dropping fork as the
  # default, OpenCV introducing a background thread pool, a new
  # dependency adding pre-fork locks) block releases.  Production
  # decoders still force ``spawn`` — see the comment on
  # ``_MP_SPAWN_CTX`` in src/qrstream/decoder.py.
  fork-safety-probe:
    name: fork-safety-probe (${{ matrix.os }})
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # x86_64 / amd64
          - ubuntu-24.04-arm    # aarch64 / arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run fork-safety probe on testcase-v070
        # -W default::DeprecationWarning makes sure Python surfaces
        # the 'fork() in multi-threaded parent' warning in the
        # stderr tail, even though the probe itself also captures
        # and summarises it.
        run: uv run python -W "default::DeprecationWarning" dev/probe-fork-safety.py
