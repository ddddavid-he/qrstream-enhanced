name: real-world-tests

# End-to-end smoke layer: decode the real phone-recorded QR videos
# in ``tests/fixtures/`` and verify byte-exact recovery of the
# source files.
#
# Why this is a separate workflow from ``test.yml``:
#   * Each case takes multiple seconds (OpenCV + WeChatQRCode
#     actually walking frames of a real capture), so running it in
#     the per-(os × python-version) unit-test matrix would multiply
#     CI time for coverage we don't need — these tests exercise
#     OpenCV, not Python-version-specific code.
#   * Splitting it out keeps unit tests fast while still letting
#     dev pushes and release gates exercise the real recordings.
#
# Trigger policy:
#   * ``dev`` is the single integration gate (see BRANCHING.md);
#     ``main`` does NOT trigger CI.  The tag-triggered release gate
#     re-runs this file via ``workflow_call``.
#   * The weekly ``schedule`` cron is a darwin/linux upstream-wheel
#     canary — it runs independently of new commits.
#
# Gating vs. non-gating:
#   * Most real-phone-v3 and all real-phone-v4 cases are gating:
#     any failure fails this job.
#   * ``v070`` is marked ``xfail(strict=False)`` in
#     ``tests/test_real_recordings.py`` so its occasional
#     misdetection on specific ffmpeg builds shows up as XFAIL /
#     XPASS in the report but never blocks a release.

on:
  push:
    branches:
      - dev
    paths:
      # Only re-run when something that could actually affect the
      # end-to-end decode path changes.
      - 'src/qrstream/**'
      - 'tests/test_real_recordings.py'
      - 'tests/test_real_recordings_layered.py'
      - 'tests/fixtures/**'
      - '.github/workflows/real-world-tests.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches:
      - dev
    paths:
      - 'src/qrstream/**'
      - 'tests/test_real_recordings.py'
      - 'tests/test_real_recordings_layered.py'
      - 'tests/fixtures/**'
      - '.github/workflows/real-world-tests.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    # Mondays 06:00 UTC (Mon 14:00 Asia/Shanghai): upstream-wheel
    # canary.  This workflow's dependencies drift *without* any
    # change in our repo:
    #   * opencv-contrib-python patch versions (pip resolves on each
    #     runner boot — not fully pinned in uv.lock for native wheels)
    #   * ffmpeg baked into the GitHub runner image
    #   * WeChatQRCode model files embedded in the opencv wheel
    # A code-freeze week with no pushes would hide those regressions
    # until the next PR author accidentally catches the blame; the
    # weekly cron surfaces them out-of-band so the cause is
    # obviously upstream.  Monday morning is deliberate — if it
    # fails there's a full work week to diagnose.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: real-world-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  real-world:
    # ``skip-ci:`` commit-message prefix opts a push event out of CI.
    # See BRANCHING.md → "skip-ci: 约定".
    if: |
      !(
        github.event_name == 'push' &&
        startsWith(github.event.head_commit.message || '', 'skip-ci:')
      )
    name: real-world (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux amd64 + arm64 cover server/container deployments;
        # macos-latest (darwin arm64) validates the darwin-arm64
        # OpenCV / WeChatQRCode wheel.  All three run on every
        # trigger — real-world fixture decoding is the strongest
        # gate we have and dev must pass it on every supported
        # architecture.
        os:
          - ubuntu-latest       # x86_64 / amd64
          - ubuntu-24.04-arm    # aarch64 / arm64
          - macos-latest        # darwin / arm64 (Apple Silicon)
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run end-to-end phone-recording tests
        # Intentionally run only the real-phone fixture suites that gate
        # releases. Other ``@pytest.mark.slow`` tests (for example the
        # decoder↔sandbox wiring checks) are useful diagnostics but are
        # not part of the release gate, and one of them deliberately runs
        # unsafe in-process detection that can abort on arm64 phone-capture
        # frames before pytest can report a normal failure.
        run: >-
          uv run pytest -m slow -v
          tests/test_real_recordings.py
          tests/test_real_recordings_layered.py
