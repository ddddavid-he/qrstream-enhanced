[project]
name = "qrstream"
version = "0.2.0"
description = "Encode and decode files via QR code video streams using LT fountain codes"
requires-python = ">=3.10"
dependencies = [
    "opencv-python>=4.5.0",
    "numpy>=1.20.0",
    "tqdm>=4.60.0",
    "qrcode[pil]>=7.0",
]

[project.scripts]
qrstream = "qrstream.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qrstream"]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
